name: ci
on:
  push:
    branches: [main]
  # pull_request:
  #   branches: [main]

jobs: 
  test: 
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: run ci
        run: npm ci
        
      - name: run tests
        run: npm test

      

  lint: 
    runs-on: ubuntu-latest 
    needs: test
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: run ci
        run: npm ci
        
      - name: linter
        run: npm run lint

  docker: 
    runs-on: ubuntu-latest 
    needs: lint
    if: github.event_name == 'push'
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: set up docker Buildx
        uses: docker/setup-buildx-action@v4
       
      - name: log into docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: build and push docker image
        uses: docker/build-push-action@v7
        with:
         context: .
         push: true
         tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_TOKEN }}:latest
         
  
